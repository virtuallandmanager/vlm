services:
  - type: web
    name: vlm
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: VLM_MODE
        value: single
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
